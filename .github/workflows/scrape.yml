name: Run AU PM Signal Engine

on:
  schedule:
    # Run every 6 hours (at minute 0 past every 6th hour)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
          cache: 'pip' # caching pip dependencies

      - name: Install Google Chrome (for Selenium/Scraping if needed)
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Credentials JSON
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > service_account.json

      - name: Run Scraper
        env:
          GOOGLE_CREDENTIALS_JSON: service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} # Optional
        run: |
          # Run the engine in 'run once' mode so it exits after completing the jobs
          python main.py --once
